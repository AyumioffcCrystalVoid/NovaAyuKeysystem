<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gerador de Chave - NovaAyu</title>
  <style>
	body{height:100vh;margin:0;display:flex;align-items:center;justify-content:center;font-family:Inter,Arial;background:#071227;color:#e6f0fb}
	.card{padding:24px;border-radius:10px;background:#081424;border:1px solid rgba(255,255,255,0.03);text-align:center;width:360px}
	h1{font-size:18px;margin:0 0 12px}
	.key{font-family:monospace;background:rgba(255,255,255,0.02);padding:10px;border-radius:6px;margin:12px 0}
	button{padding:8px 12px;border-radius:8px;border:0;background:#3b82f6;color:#fff;cursor:pointer}
	a{color:#9fb0c9;text-decoration:none;margin-left:8px}
  </style>
</head>
<body>
  <div class="card">
	<h1>Gerador de Chave NovaAyu</h1>
	<div id="generated" class="key">—</div>
	<div>
	  <button id="gen">Gerar chave</button>
	  <button id="copy" style="margin-left:8px" disabled>Copiar</button>
	  <a id="site" href="https://novaayu.gg" target="_blank">Abrir site</a>
	</div>
  </div>

  <script>
	function generateKey(){
	  const parts = [];
	  for(let i=0;i<4;i++){
		const n = Math.floor(Math.random()*1000); // 0..999
		parts.push(String(n).padStart(3,'0'));
	  }
	  return parts.join('-'); // formato 000-000-000-000
	}

	const genBtn = document.getElementById('gen');
	const copyBtn = document.getElementById('copy');
	const out = document.getElementById('generated');

	genBtn.addEventListener('click', async ()=>{
	  const k = generateKey();
	  out.textContent = k;
	  copyBtn.disabled = false;
	  try{ await navigator.clipboard.writeText(k);}catch(e){}
	});

	copyBtn.addEventListener('click', async ()=>{
	  const k = out.textContent.trim(); if(!k || k==='—') return;
	  try{ await navigator.clipboard.writeText(k); copyBtn.textContent='Copiado'; setTimeout(()=>copyBtn.textContent='Copiar',1500);}catch(e){}
	});
  </script>
</body>
</html>
